<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>訂單紀錄 | 宜蘭小食點餐系統</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Records</p>
        <h1>訂單紀錄</h1>
      </div>
      <a class="admin-link" href="index.html">回到點餐</a>
    </header>

    <main class="records-page">
      <section id="loginPanel" class="login-panel" aria-labelledby="login-title">
        <p class="eyebrow">Login</p>
        <h2 id="login-title">查看訂單</h2>
        <form id="loginForm" class="order-form">
          <label>
            帳號
            <input name="username" autocomplete="username" required>
          </label>
          <label>
            密碼
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button class="submit-button" type="submit">登入</button>
          <p id="loginMessage" class="form-message" role="status"></p>
        </form>
      </section>

      <section id="recordsPanel" class="records-panel" hidden>
        <div class="section-heading">
        <div>
          <p class="eyebrow">Submitted Orders</p>
          <h2>使用者送出的資料</h2>
        </div>
          <div class="record-actions">
            <button id="refreshOrders" class="secondary-button" type="button">重新整理</button>
            <button id="logoutButton" class="secondary-button" type="button">登出</button>
          </div>
        </div>
        <section class="stats-panel" aria-labelledby="stats-title">
          <div class="section-heading compact-heading">
            <div>
              <p class="eyebrow">Summary</p>
              <h2 id="stats-title">項目統計</h2>
            </div>
            <button id="exportStats" class="secondary-button" type="button">匯出 Excel</button>
          </div>
          <div id="statsList" class="stats-list"></div>
        </section>
        <div id="ordersList" class="orders-list"></div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="orders.js"></script>
  </body>
</html>
