<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>蘭陽賞鯨二日遊早餐點餐系統</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Breakfast</p>
        <h1>蘭陽賞鯨二日遊早餐點餐系統</h1>
      </div>
      <a class="admin-link" href="orders.html">查看訂單</a>
    </header>

    <main class="layout">
      <section class="menu-section" aria-labelledby="menu-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Menu</p>
            <h2 id="menu-title">點餐菜單</h2>
          </div>
          <p class="hint">選擇日期分頁與餐點後，填寫訂購人即可送出。</p>
        </div>
        <div id="dayTabs" class="day-tabs" role="tablist" aria-label="選擇菜單日期"></div>
        <div id="categoryTabs" class="category-tabs" role="tablist" aria-label="選擇第二天餐點類別"></div>
        <div id="menuList" class="menu-grid"></div>
      </section>

      <aside class="checkout" aria-labelledby="cart-title">
        <h2 id="cart-title">你的餐點</h2>
        <div id="cartItems" class="cart-items empty">尚未選擇餐點</div>
        <div class="total-row">
          <span>合計</span>
          <strong id="cartTotal">$0</strong>
        </div>

        <form id="orderForm" class="order-form">
          <label>
            姓名
            <select name="customerName" required>
              <option value="">請選擇訂購人</option>
              <option>大舅舅</option>
              <option>小舅舅</option>
              <option>小阿姨</option>
              <option>258</option>
              <option>翁蝦</option>
              <option>竹南</option>
              <option>新豐</option>
              <option>台灣大道</option>
              <option>呱</option>
              <option>英傑叔叔</option>
            </select>
          </label>
          <label>
            備註
            <textarea name="note" rows="3" placeholder="例如：不要蔥、餐具兩份"></textarea>
          </label>
          <button class="submit-button" type="submit">送出訂單</button>
          <p id="formMessage" class="form-message" role="status"></p>
        </form>
      </aside>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
