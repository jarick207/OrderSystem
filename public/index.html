<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>宜蘭小食點餐系統</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Yilan Table</p>
        <h1>宜蘭小食點餐</h1>
      </div>
      <a class="admin-link" href="orders.html">查看訂單</a>
    </header>

    <main class="layout">
      <section class="menu-section" aria-labelledby="menu-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Menu</p>
            <h2 id="menu-title">今日菜單</h2>
          </div>
          <p class="hint">選好餐點後填寫取餐資料即可送出。</p>
        </div>
        <div id="menuList" class="menu-grid"></div>
      </section>

      <aside class="checkout" aria-labelledby="cart-title">
        <h2 id="cart-title">你的餐點</h2>
        <div id="cartItems" class="cart-items empty">尚未選擇餐點</div>
        <div class="total-row">
          <span>合計</span>
          <strong id="cartTotal">$0</strong>
        </div>

        <form id="orderForm" class="order-form">
          <label>
            姓名
            <input name="customerName" autocomplete="name" required>
          </label>
          <label>
            電話
            <input name="phone" autocomplete="tel" required>
          </label>
          <label>
            取餐時間
            <input name="pickupTime" type="time" required>
          </label>
          <label>
            備註
            <textarea name="note" rows="3" placeholder="例如：不要蔥、餐具兩份"></textarea>
          </label>
          <button class="submit-button" type="submit">送出訂單</button>
          <p id="formMessage" class="form-message" role="status"></p>
        </form>
      </aside>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
